<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Informe Ejecutivo de Ciberseguridad | 11/05/2026 10:40 CEST</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #040a12;
      --fg: #eaf3fc;
      --muted: #8ea5c0;
      --accent: #74f1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(58,160,255,.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,92,116,.10), transparent 30%),
        linear-gradient(180deg, #06101c 0%, #03070e 100%);
      color: var(--fg);
      font-family: "DejaVu Sans", Arial, sans-serif;
      padding: 24px;
    }
    .wrap {
      max-width: 1460px;
      margin: 0 auto;
    }
    .meta {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 22px;
      padding: 18px 22px;
      border: 1px solid rgba(116, 241, 255, 0.14);
      border-radius: 20px;
      background: rgba(8, 18, 31, 0.72);
      backdrop-filter: blur(8px);
    }
    .meta strong { color: var(--accent); }
    .meta small { color: var(--muted); display: block; margin-top: 4px; }
    .page-shell {
      margin: 0 0 24px;
      padding: 18px;
      border-radius: 28px;
      background: rgba(7, 15, 26, 0.72);
      border: 1px solid rgba(116, 241, 255, 0.08);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.33);
    }
    .page-shell svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 22px;
      overflow: hidden;
    }
    .notes {
      margin-top: 20px;
      padding: 18px 22px;
      border-radius: 20px;
      background: rgba(8, 18, 31, 0.8);
      border: 1px solid rgba(116, 241, 255, 0.08);
    }
    .notes h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: var(--accent);
    }
    .notes p, .notes li {
      color: var(--muted);
      line-height: 1.55;
    }
    .sources {
      margin: 0;
      padding-left: 18px;
    }
    .sources li {
      margin: 0 0 10px;
    }
    .sources a {
      color: #9befff;
      text-decoration: none;
      font-weight: 600;
      margin-right: 10px;
    }
    .sources span {
      color: #90a8c5;
    }
    @media (max-width: 900px) {
      body { padding: 12px; }
      .page-shell { padding: 10px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="meta">
      <div>
        <strong>MMarco Seguridad</strong>
        <small>Informe Ejecutivo de Ciberseguridad | 11/05/2026 10:40 CEST</small>
      </div>
      <div>
        <strong>Corte real</strong>
        <small>2026-05-11 10:40:12 CEST | Zona Europe/Madrid</small>
      </div>
      <div>
        <strong>Nivel global</strong>
        <small>ALTO | Riesgo IA Elevado</small>
      </div>
    </div>
