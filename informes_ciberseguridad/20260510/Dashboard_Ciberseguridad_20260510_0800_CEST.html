    async function inflate(){
      const bytes = Uint8Array.from(atob(payload), c => c.charCodeAt(0));
      if (!('DecompressionStream' in window)) {
        document.body.innerHTML = '<div class="loading"><div class="card"><h1>Compatibilidad del navegador</h1><p class="muted">Este navegador no soporta DecompressionStream. Descarga el HTML exportado desde el chat para ver la version completa.</p></div></div>';
        return;
      }
      const stream = new Response(bytes).body.pipeThrough(new DecompressionStream('gzip'));
      const text = await new Response(stream).text();
      document.open();
      document.write(text.replace(/__GITHUB_HTML_URL__/g, location.href));
      document.close();
    }
    inflate().catch(() => {
      document.body.innerHTML = '<div class="loading"><div class="card"><h1>Error de carga</h1><p class="muted">No se pudo reconstruir el dashboard desde el paquete historico.</p></div></div>';
